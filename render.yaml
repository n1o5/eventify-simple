services:
  # ── FastAPI backend ──────────────────────────────────────────
  - type: web
    name: eventify-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: eventify-db
          property: connectionString
    healthCheckPath: /api/health

# ── PostgreSQL database ──────────────────────────────────────
databases:
  - name: eventify-db
    databaseName: eventify_db
    user: eventify
    plan: free
